version: "3.9"
services:
  backend:
    build: .
    container_name: giginsure_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
      - ./ml/models:/app/ml/models
    environment:
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY:-}
      - DATABASE_URL=sqlite:///./data/giginsure.db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: giginsure_web
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
