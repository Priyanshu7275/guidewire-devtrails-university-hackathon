<!doctype html>
<!--
  index.html — HTML shell for the GigInsure React SPA.

  React renders everything inside <div id="root">.
  We load the Inter font from Google Fonts here so it is available globally
  before any React code runs.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes the viewport responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Inter font from Google Fonts (weights 300-700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>GigInsure — Income Protection for India's Gig Workers</title>
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite injects the bundled JS here during build -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
